<!DOCTYPE html>
<html>
<head>
<title>Photo Reward</title>
<style>
body{font-family:Arial;background:#f4f4f4;text-align:center;}
.container{background:white;width:90%;max-width:400px;margin:50px auto;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
input{width:90%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:5px;}
button{padding:10px 20px;background:#2b7cff;color:white;border:none;border-radius:5px;cursor:pointer;}
.back-box{display:block;margin-top:20px;padding:12px;background:yellow;border-radius:8px;font-weight:bold;cursor:pointer;}
#message{margin-top:10px;font-weight:bold;}
</style>
</head>
<body>
<div class="container">
<h2>Photo Reward</h2>
<p>Upload a photo to earn points.</p>
<input type="file" id="photo">
<button onclick="submitForm()">Submit</button>
<p id="message"></p>
<div class="back-box" onclick="goBack()">⬅ Back to Dashboard</div>
</div>
<script>
function goBack(){window.location.href="dashboard.html";}
function submitForm(){
let photo=document.getElementById("photo").value;
let message=document.getElementById("message");
if(photo==""){message.style.color="red"; message.innerHTML="Select a photo first!";}
else{message.style.color="green"; message.innerHTML="Photo submitted successfully!";}
}
</script>
</body>
</html>
