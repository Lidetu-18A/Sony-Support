
<!DOCTYPE html>
<html>
<head>
<title>Recharge</title>
<style>
body{font-family:Arial;background:#f4f4f4;text-align:center;}
.container{background:white;width:90%;max-width:400px;margin:50px auto;padding:20px;border-radius:10px;}
input{width:90%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:5px;}
button{padding:10px 20px;background:#2b7cff;color:white;border:none;border-radius:5px;cursor:pointer;}
.back-box{display:block;margin-top:20px;padding:12px;background:yellow;border-radius:8px;font-weight:bold;cursor:pointer;}
#message{margin-top:10px;font-weight:bold;}
</style>
</head>
<body>
<div class="container">
<h2>Recharge</h2>
<p>CBE Account: 1000299522648</p>
<p>Name: Lidetu Abera Beyene</p>
<input type="number" id="amount" placeholder="Enter amount to add">
<button onclick="submitForm()">Submit</button>
<p id="message"></p>
<div class="back-box" onclick="goBack()">⬅ Back to Dashboard</div>
</div>

<script>
function goBack(){window.location.href="dashboard.html";}

// Load balance safely
let balance = localStorage.getItem("balance");
if(balance === null || isNaN(balance)) balance = 0;
else balance = parseFloat(balance);

function submitForm(){
let amount = parseFloat(document.getElementById("amount").value);
let message = document.getElementById("message");

if(!amount || amount <= 0){
    message.style.color = "red";
    message.innerHTML = "Enter a valid amount!";
    return;
}

// Add recharge amount to balance
balance += amount;

// Save new balance
localStorage.setItem("balance", balance);

// Update message
message.style.color = "green";
message.innerHTML = "Recharge successful! Current balance: $" + balance.toFixed(2);

// Clear input
document.getElementById("amount").value = "";
}
</script>
</body>
</html>
