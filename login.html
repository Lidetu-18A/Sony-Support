<link rel="stylesheet" href="style.css">
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Platform</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#1e90ff,#00c6ff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    padding:30px;
    width:320px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
}

.input-box{
    margin-bottom:15px;
}

.input-box input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#1e90ff;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#187bcd;
}

.register{
    text-align:center;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<form action="dashboard.html">

<div class="input-box">
<input type="text" placeholder="Username" required>
</div>

<div class="input-box">
<input type="password" placeholder="Password" required>
</div>

<button type="submit">Login</button>

</form>

<div class="register">
<p>Don't have account? <a href="register.html">Register</a></p>
</div>

</div>

</body>
</html>
