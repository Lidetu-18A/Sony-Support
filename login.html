<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="style.css">
<style>
body{font-family:Arial;text-align:center;background:#f4f4f4;}
.container{max-width:400px;margin:100px auto;padding:20px;background:white;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
input{width:80%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc;}
button{padding:10px 20px;background:#2b7cff;color:white;border:none;border-radius:5px;cursor:pointer;}
</style>
</head>
<div class="container">
<h2>Login</h2>
<input type="text" id="username" placeholder="Username"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<p id="message"></p>
</div>
<div style="margin-top:10px;">
<a href="register.html">Don't have an account? Register</a>
</div>
<body>
<script>
function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];
  let found = users.find(u => u.username === user && u.password === pass);

  if(found){
    localStorage.setItem("currentUser", user);
    localStorage.setItem("isLoggedIn","true");
    window.location.href = "dashboard.html";
  } else {
    document.getElementById("message").style.color="red";
    document.getElementById("message").innerText = "Invalid login!";
  }
}

// Prevent direct access to dashboard
if(window.location.pathname.includes("dashboard.html")) {
  if(localStorage.getItem("isLoggedIn") !== "true"){
    window.location.href = "login.html";
  }
}
</script>
</body>
</html>
